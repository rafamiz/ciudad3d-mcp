<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciudad 3D · Asistente urbanístico CABA</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2230;
      --text: #e6e8ee;
      --muted: #8b93a7;
      --accent: #5b8def;
      --accent-2: #7c5cff;
      --user: #2a3450;
      --assistant: #1d2230;
      --border: #262b39;
      --ok: #3ecf8e;
      --warn: #f5a524;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
    }
    header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }
    header .sub {
      font-size: 13px;
      color: var(--muted);
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      gap: 16px;
      overflow: hidden;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid var(--border);
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      max-width: 100%;
    }
    .tools {
      align-self: flex-start;
      max-width: 85%;
      font-size: 12px;
      color: var(--muted);
      background: var(--panel-2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tools b { color: var(--accent); }
    .typing {
      align-self: flex-start;
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
    }
    .typing::after {
      content: '';
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--muted);
      border-radius: 50%;
      margin-left: 2px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.2 } 50% { opacity: 1 } }

    form {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    textarea {
      flex: 1;
      resize: none;
      background: transparent;
      color: var(--text);
      border: none;
      outline: none;
      font: inherit;
      font-size: 15px;
      min-height: 24px;
      max-height: 160px;
    }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .examples button {
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 400;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .examples button:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 8px;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div style="font-size: 20px;">🏙️</div>
    <div>
      <h1>Ciudad 3D</h1>
      <div class="sub">Asistente urbanístico de CABA · Catastro, CUR, patrimonio</div>
    </div>
  </header>

  <main>
    <div id="chat">
      <div class="msg system">
        Preguntá sobre cualquier parcela de Buenos Aires: edificabilidad, plusvalía,
        patrimonio, usos del suelo, obras, fotos.
      </div>
      <div class="examples">
        <button data-q="¿Qué se puede construir en Av. Corrientes 1234?">Edificabilidad de una dirección</button>
        <button data-q="Dame un informe completo del SMP 045-143-001J">Informe completo por SMP</button>
        <button data-q="¿La parcela en Defensa 1100 tiene protección patrimonial?">Patrimonio</button>
        <button data-q="Calculá la plusvalía de Av. Santa Fe 3000">Plusvalía</button>
      </div>
    </div>

    <form id="form">
      <textarea id="input" placeholder="Preguntá sobre una parcela..." rows="1" required></textarea>
      <button type="submit" id="send">Enviar</button>
    </form>
  </main>

  <footer>
    Datos: <a href="https://buenosaires.gob.ar" target="_blank">GCBA · USIG · EPOK</a> ·
    Asistente con Claude
  </footer>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const messages = []; // [{role, content}]

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addToolEvents(events) {
      if (!events || events.length === 0) return;
      const div = document.createElement('div');
      div.className = 'tools';
      div.innerHTML = events.map(e => {
        const args = JSON.stringify(e.input);
        return `🔧 <b>${e.name}</b>(${args})`;
      }).join('<br>');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.textContent = 'Pensando';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage(text) {
      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      send.disabled = true;
      input.disabled = true;
      const typing = addTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });
        typing.remove();

        if (!res.ok) {
          const err = await res.text();
          addMessage('system', `Error ${res.status}: ${err}`);
          return;
        }

        const data = await res.json();
        addToolEvents(data.tool_events);
        addMessage('assistant', data.reply);
        messages.push({ role: 'assistant', content: data.reply });
      } catch (e) {
        typing.remove();
        addMessage('system', `Error de red: ${e.message}`);
      } finally {
        send.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      sendMessage(text);
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    document.querySelectorAll('.examples button').forEach(btn => {
      btn.addEventListener('click', () => {
        const q = btn.getAttribute('data-q');
        input.value = q;
        form.requestSubmit();
      });
    });
  </script>
</body>
</html>
