<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciudad 3D · Asistente urbanístico CABA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2230;
      --text: #e6e8ee;
      --muted: #8b93a7;
      --accent: #5b8def;
      --accent-2: #7c5cff;
      --user: #2a3450;
      --assistant: #1d2230;
      --border: #262b39;
      --ok: #3ecf8e;
      --warn: #f5a524;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
    }
    header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }
    header .sub {
      font-size: 13px;
      color: var(--muted);
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      gap: 16px;
      overflow: hidden;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid var(--border);
      white-space: normal;
    }
    /* Markdown rendering en mensajes del asistente */
    .msg.assistant > *:first-child { margin-top: 0; }
    .msg.assistant > *:last-child { margin-bottom: 0; }
    .msg.assistant h1,
    .msg.assistant h2,
    .msg.assistant h3,
    .msg.assistant h4 {
      margin: 14px 0 6px;
      font-weight: 600;
      line-height: 1.25;
    }
    .msg.assistant h1 { font-size: 18px; }
    .msg.assistant h2 { font-size: 16px; color: var(--accent); }
    .msg.assistant h3 { font-size: 15px; color: var(--text); }
    .msg.assistant h4 { font-size: 14px; color: var(--muted); }
    .msg.assistant p { margin: 6px 0; }
    .msg.assistant ul,
    .msg.assistant ol {
      margin: 6px 0;
      padding-left: 22px;
    }
    .msg.assistant li { margin: 2px 0; }
    .msg.assistant strong { color: #fff; }
    .msg.assistant em { color: var(--muted); }
    .msg.assistant a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dotted var(--accent);
    }
    .msg.assistant a:hover { color: var(--accent-2); }
    .msg.assistant code {
      background: var(--panel);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      color: #ffd866;
    }
    .msg.assistant pre {
      background: var(--panel);
      padding: 10px 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--border);
    }
    .msg.assistant pre code {
      background: transparent;
      padding: 0;
      color: var(--text);
      font-size: 13px;
    }
    .msg.assistant blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 12px;
      margin: 8px 0;
      color: var(--muted);
      background: rgba(91, 141, 239, 0.06);
    }
    .msg.assistant hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }
    .msg.assistant table {
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 14px;
      width: 100%;
      max-width: 100%;
      display: block;
      overflow-x: auto;
    }
    .msg.assistant table thead {
      background: var(--panel);
    }
    .msg.assistant table th,
    .msg.assistant table td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    .msg.assistant table th {
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
    }
    .msg.assistant table tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.02);
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      max-width: 100%;
    }
    .tools {
      align-self: flex-start;
      max-width: 85%;
      font-size: 12px;
      color: var(--muted);
      background: var(--panel-2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tools b { color: var(--accent); }
    .tools .tool-line { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .tools .tool-line .spinner {
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .tools .tool-line.done .spinner {
      border: none;
      width: 10px; height: 10px;
      background: var(--ok);
      border-radius: 50%;
      animation: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Galería de fotos */
    .photos {
      align-self: flex-start;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
      max-width: 85%;
      width: 100%;
    }
    .photos a {
      display: block;
      overflow: hidden;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: transform 0.15s;
    }
    .photos a:hover { transform: scale(1.02); border-color: var(--accent); }
    .photos img {
      display: block;
      width: 100%;
      height: 110px;
      object-fit: cover;
      background: var(--panel-2);
    }

    /* Mini-mapa */
    .map-wrap {
      align-self: flex-start;
      width: 100%;
      max-width: 85%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .map {
      height: 280px;
      background: var(--panel-2);
    }
    /* Tema oscuro para Leaflet */
    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.9); }
    .typing {
      align-self: flex-start;
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
    }
    .typing::after {
      content: '';
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--muted);
      border-radius: 50%;
      margin-left: 2px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.2 } 50% { opacity: 1 } }

    form {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    textarea {
      flex: 1;
      resize: none;
      background: transparent;
      color: var(--text);
      border: none;
      outline: none;
      font: inherit;
      font-size: 15px;
      min-height: 24px;
      max-height: 160px;
    }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .examples button {
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 400;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .examples button:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 8px;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div style="font-size: 20px;">🏙️</div>
    <div>
      <h1>Ciudad 3D</h1>
      <div class="sub">Asistente urbanístico de CABA · Catastro, CUR, patrimonio</div>
    </div>
  </header>

  <main>
    <div id="chat">
      <div class="msg system">
        Preguntá sobre cualquier parcela de Buenos Aires: edificabilidad, plusvalía,
        patrimonio, usos del suelo, obras, fotos.
      </div>
      <div class="examples">
        <button data-q="¿Qué se puede construir en Av. Corrientes 1234?">Edificabilidad de una dirección</button>
        <button data-q="Dame un informe completo del SMP 045-143-001J">Informe completo por SMP</button>
        <button data-q="¿La parcela en Defensa 1100 tiene protección patrimonial?">Patrimonio</button>
        <button data-q="Calculá la plusvalía de Av. Santa Fe 3000">Plusvalía</button>
      </div>
    </div>

    <form id="form">
      <textarea id="input" placeholder="Preguntá sobre una parcela..." rows="1" required></textarea>
      <button type="submit" id="send">Enviar</button>
    </form>
  </main>

  <footer>
    Datos: <a href="https://buenosaires.gob.ar" target="_blank">GCBA · USIG · EPOK</a> ·
    Asistente con Claude
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const messages = []; // historial enviado al backend

    marked.setOptions({ gfm: true, breaks: true });

    function renderMarkdown(text) {
      const html = marked.parse(text || '');
      return DOMPurify.sanitize(html, {
        ALLOWED_ATTR: ['href', 'title', 'target', 'rel', 'colspan', 'rowspan', 'align'],
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function addUserMessage(content) {
      const div = document.createElement('div');
      div.className = 'msg user';
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addSystemMessage(content) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addPhotos(urls) {
      const wrap = document.createElement('div');
      wrap.className = 'photos';
      for (const url of urls) {
        const a = document.createElement('a');
        a.href = url.replace(/w=\d+/, 'w=1600');
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        const img = document.createElement('img');
        img.src = url;
        img.loading = 'lazy';
        img.alt = 'Foto de la parcela';
        a.appendChild(img);
        wrap.appendChild(a);
      }
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function addMap(geojson) {
      const wrap = document.createElement('div');
      wrap.className = 'map-wrap';
      const inner = document.createElement('div');
      inner.className = 'map';
      wrap.appendChild(inner);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;

      // Leaflet necesita que el div esté en el DOM antes de inicializar.
      requestAnimationFrame(() => {
        try {
          const map = L.map(inner, {
            attributionControl: false,
            scrollWheelZoom: false,
          });
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
          }).addTo(map);
          const layer = L.geoJSON(geojson, {
            style: {
              color: '#5b8def',
              weight: 2,
              fillColor: '#5b8def',
              fillOpacity: 0.25,
            },
          }).addTo(map);
          const bounds = layer.getBounds();
          if (bounds.isValid()) {
            map.fitBounds(bounds, { padding: [20, 20], maxZoom: 19 });
          } else {
            map.setView([-34.6037, -58.3816], 13);
          }
        } catch (e) {
          inner.textContent = 'No se pudo renderizar el mapa: ' + e.message;
        }
      });
    }

    // Renderizador de stream con state machine simple.
    class StreamRenderer {
      constructor() {
        this.bubble = null;          // div del mensaje en construcción
        this.bubbleText = '';        // markdown acumulado del bubble actual
        this.fullText = '';          // texto completo (para el historial)
        this.toolsBox = null;        // contenedor de tools en curso
        this.activeToolLines = {};   // name → div line en curso
      }

      _newBubble() {
        this.bubble = document.createElement('div');
        this.bubble.className = 'msg assistant';
        this.bubbleText = '';
        chat.appendChild(this.bubble);
      }

      _ensureToolsBox() {
        if (!this.toolsBox) {
          this.toolsBox = document.createElement('div');
          this.toolsBox.className = 'tools';
          chat.appendChild(this.toolsBox);
        }
        return this.toolsBox;
      }

      handle(evt) {
        switch (evt.type) {
          case 'tool_call': {
            // empieza una nueva tool: corta el bubble actual
            this.bubble = null;
            const box = this._ensureToolsBox();
            const line = document.createElement('div');
            line.className = 'tool-line';
            const args = JSON.stringify(evt.input);
            line.innerHTML = `<span class="spinner"></span> 🔧 <b>${escapeHtml(evt.name)}</b>(${escapeHtml(args)})`;
            box.appendChild(line);
            this.activeToolLines[evt.name] = line;
            break;
          }
          case 'tool_result': {
            const line = this.activeToolLines[evt.name];
            if (line) {
              line.classList.add('done');
              delete this.activeToolLines[evt.name];
            }
            break;
          }
          case 'photos':
            this.bubble = null;
            this.toolsBox = null;
            addPhotos(evt.urls);
            break;
          case 'geometry':
            this.bubble = null;
            this.toolsBox = null;
            addMap(evt.geojson);
            break;
          case 'text': {
            // texto entrante: si no hay bubble activo, abro uno nuevo
            if (!this.bubble) {
              this.toolsBox = null;
              this._newBubble();
            }
            this.bubbleText += evt.delta;
            this.fullText += evt.delta;
            this.bubble.innerHTML = renderMarkdown(this.bubbleText);
            this.bubble.querySelectorAll('a').forEach(a => {
              a.setAttribute('target', '_blank');
              a.setAttribute('rel', 'noopener noreferrer');
            });
            break;
          }
          case 'error':
            addSystemMessage('Error: ' + evt.message);
            break;
          case 'done':
            break;
        }
        chat.scrollTop = chat.scrollHeight;
      }
    }

    async function sendMessage(text) {
      addUserMessage(text);
      messages.push({ role: 'user', content: text });

      send.disabled = true;
      input.disabled = true;

      const renderer = new StreamRenderer();

      try {
        const res = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        if (!res.ok) {
          const err = await res.text();
          addSystemMessage(`Error ${res.status}: ${err}`);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buffer.indexOf('\n')) !== -1) {
            const line = buffer.slice(0, nl).trim();
            buffer = buffer.slice(nl + 1);
            if (!line) continue;
            try {
              const evt = JSON.parse(line);
              renderer.handle(evt);
            } catch (e) {
              console.error('Bad NDJSON line:', line);
            }
          }
        }

        if (renderer.fullText) {
          messages.push({ role: 'assistant', content: renderer.fullText });
        }
      } catch (e) {
        addSystemMessage('Error de red: ' + e.message);
      } finally {
        send.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      sendMessage(text);
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    document.querySelectorAll('.examples button').forEach(btn => {
      btn.addEventListener('click', () => {
        const q = btn.getAttribute('data-q');
        input.value = q;
        form.requestSubmit();
      });
    });
  </script>
</body>
</html>
